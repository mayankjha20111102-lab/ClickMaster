<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Click Master - Free Click Game</title>
  <meta name="description" content="Click Master is a simple addictive click game. Play on mobile and PC, upgrade your power and beat your score!">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game">

    <h1>CLICK MASTER ⚡</h1>

    <div class="stats">
      <p>Score: <span id="score">0</span></p>
      <p>CPS: <span id="cps">0</span></p>
    </div>

    <button class="btn" onclick="clickMe()">TAP</button>

    <div class="shop">
      <button onclick="buyAuto()">Buy Auto Click (50)</button>
      <button onclick="buyPower()">Double Power (200)</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
